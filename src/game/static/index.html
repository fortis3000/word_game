<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Similarity Game</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <main id="start-screen" class="screen-center">
            <header>
                <h1>Word Context Game</h1>
                <p>Explore semantic relationships. Find words closely related to the hidden context.</p>
            </header>
            <div class="menu-actions">
                <button id="start-btn" class="primary-btn large-btn">Start New Game</button>
            </div>
        </main>

        <main id="game-area" class="hidden">
            <header class="game-header">
                <h2>Word Context Game</h2>
                <button id="quit-btn" class="text-btn">Quit Game</button>
            </header>

            <div class="score-board">
                <div class="score-item">
                    <span class="label">Round Score</span>
                    <span id="round-score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">Total Score</span>
                    <span id="total-score" class="value">0</span>
                </div>
            </div>

            <div class="words-container">
                <div class="section current-words">
                    <h3>Current Context</h3>
                    <div id="current-words-list" class="word-cloud">
                        <!-- Words injected here -->
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="word-input" placeholder="Type a related word..." autocomplete="off">
                <button id="submit-btn" class="primary-btn">Submit</button>
            </div>

            <div class="feedback-area">
                <!-- Removed list removed per user request -->
            </div>
        </main>

        <main id="game-over-screen" class="hidden screen-center">
            <h2>Game Over!</h2>
            <p>You found all the words!</p>
            <div class="final-score">
                <span class="label">Final Score</span>
                <span id="final-score" class="value">0</span>
            </div>
            <button id="restart-btn" class="primary-btn large-btn">Play Again</button>
            <button id="back-to-menu-btn" class="secondary-btn">Main Menu</button>
        </main>

        <main id="summary-screen" class="hidden screen-center">
            <h2>Session Ended</h2>
            <p>Good effort! Here is how you did:</p>
            <div class="final-score">
                <span class="label">Total Score</span>
                <span id="summary-score" class="value">0</span>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="label">Words Found</span>
                    <span id="summary-words-found" class="value-small">0</span>
                </div>
            </div>
            <div class="menu-actions">
                <button id="summary-back-btn" class="primary-btn">Back to Menu</button>
            </div>
        </main>

        <div id="toast-container"></div>
    </div>
    <script src="/js/app.js"></script>
</body>

</html>
