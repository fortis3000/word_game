networks:
  word-game-net:
    driver: bridge

services:
  embedding-service:
    build:
      context: ..
      dockerfile: docker/embeddinggemma-cpu.Dockerfile
    networks:
      - word-game-net
    ports:
      - "8000:8000"
    volumes:
      - ../models/embeddinggemma300:/app/model
    # TODO: transfer commands from dockerfiles to here
    healthcheck:
      # TODO: improve healthcheck endpoint in embedding service
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/telegram-bot.Dockerfile
    networks:
      - word-game-net
    depends_on:
      embedding-service:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding-service:8000
    volumes:
      - ../data:/app/data
