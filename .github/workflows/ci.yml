name: CI

on:
  push:
    branches:
      - master
  pull_request:

env:
  PYTHON_VERSION: "3.13"

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Installing Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: ".venv"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-

      - name: Install linting dependencies
        run: uv sync --extra lint

      - name: Checking linting with ruff
        run: ruff check .

      - name: Checking formatting with ruff
        run: ruff format .

      - name: Checking markdown linting with pymarkdown
        run: uv run pymarkdown scan .

  testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Installing Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: ".venv"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: uv sync --extra all

      - name: Run tests with pytest and coverage
        run: |
          coverage run -m pytest -v tests --ignore=tests/embedding_service --ignore=tests/__pycache__
          coverage report -m --fail-under=80

  build_docker_images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build embedding service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/embeddinggemma-cpu.Dockerfile
          push: false

      - name: Build telegram bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/telegram-bot.Dockerfile
          push: false
