<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Word Similarity Game</title>
    <link rel="stylesheet" href="/css/style.css?h=e7b8845b">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
    <div class="container">
        <!-- Content same as above -->
        <main id="start-screen" class="screen-center">
            <header>
                <h1 id="main-title">Word Similarity Game</h1>
            </header>

            <div class="menu-actions" style="margin-bottom: 2rem; justify-content: center; flex-wrap: wrap;">
                <button class="primary-btn lang-btn" data-lang="en" style="width: auto; margin-bottom: 0;">EN</button>
                <button class="primary-btn lang-btn" data-lang="de" style="width: auto; margin-bottom: 0;">DE</button>
                <button class="primary-btn lang-btn" data-lang="ru" style="width: auto; margin-bottom: 0;">РУ</button>
            </div>

            <div class="tutorial-wrapper">
                <h3 id="tutorial-title" class="tutorial-title">Guess a word that has a similar meaning</h3>
            </div>

            <!-- <div class="tutorial-wrapper">
                <img id="tutorial-img" src="/img/tutorial_analogy.png" alt="Word Analogy Tutorial" class="tutorial-img">
            </div> -->

            <div class="start-actions hidden" id="start-actions">
                <button id="how-to-play-btn" class="icon-btn" title="How to Play" style="width: 3rem; height: 3rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                        <line x1="12" x2="12.01" y1="17" y2="17" />
                    </svg>
                </button>
                <button id="start-btn" class="primary-btn large-btn">Start Game</button>
            </div>
        </main>

        <main id="game-area" class="hidden">
            <div class="game-top-bar score-board">
                <div class="score-item">
                    <span class="label" id="lives-label">Lives</span>
                    <div class="lives-wrapper">
                        <div id="lives-heart" class="lives-heart">♥</div>
                        <span id="lives-count" class="lives-count">x5</span>
                    </div>
                </div>
                <div class="score-item">
                    <span class="label" id="time-label">Time</span>
                    <span id="time-remaining" class="value">3:00</span>
                </div>
                <div class="score-item">
                    <span class="label" id="score-label">Score</span>
                    <div class="score-combined">
                        <span id="total-score" class="value">0</span>
                        <span id="round-score" class="value-mini"></span>
                    </div>
                </div>
                <button id="quit-btn" class="icon-btn" title="Quit">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" x2="9" y1="12" y2="12" />
                    </svg>
                </button>
            </div>

            <div class="words-container">
                <div class="section current-words">

                    <div id="current-words-list" class="word-cloud">
                        <!-- Words injected here -->
                    </div>
                </div>
            </div>

            <div class="game-bottom-area">
                <div class="input-area">
                    <button id="info-btn" class="icon-btn" title="Info" style="flex-shrink: 0;">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                            <line x1="12" x2="12.01" y1="17" y2="17" />
                        </svg>
                    </button>
                    <div class="word-input-container">
                        <input type="text" id="word-input"
                            placeholder="Type a word close to one or several on the screen..." autocomplete="off"
                            enterkeyhint="send">
                        <button id="submit-btn" class="icon-btn submit-inside-btn" title="Submit">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" x2="11" y1="2" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </div>
                    <button id="shuffle-btn" class="icon-btn" title="Shuffle Words (Cost: 200)" style="flex-shrink: 0;">
                        <div style="display: flex; flex-direction: column; align-items: center; gap: 0.1rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="16 3 21 3 21 8" />
                                <line x1="4" x2="21" y1="20" y2="3" />
                                <polyline points="21 16 21 21 16 21" />
                                <line x1="15" x2="21" y1="15" y2="21" />
                                <line x1="4" x2="9" y1="4" y2="9" />
                            </svg>
                            <span style="font-size: 0.7rem; font-weight: 600;">200</span>
                        </div>
                    </button>
                </div>
                <div class="feedback-area">
                    <!-- Removed list removed per user request -->
                </div>
            </div>
        </main>

        <div id="countdown-overlay" class="countdown-overlay hidden">
            <div class="countdown-content">
                <div id="countdown-label" class="countdown-label">Game starts in</div>
                <span id="countdown-text" class="countdown-text">3</span>
            </div>
        </div>

        <main id="game-over-screen" class="hidden screen-center">
            <h2 id="game-over-title"></h2>
            <div class="final-score">
                <span class="label" id="final-score-label">Final Score</span>
                <span id="final-score" class="value">0</span>
            </div>
            <div class="game-over-actions">
                <button id="restart-btn" class="primary-btn large-btn">Play Again</button>
                <button id="share-score-btn-gameover" class="secondary-btn">Share Score 🏆</button>
                <button id="back-to-menu-btn" class="secondary-btn">Main Menu</button>
            </div>
        </main>

        <main id="summary-screen" class="hidden screen-center">
            <h2 id="summary-title"></h2>
            <div class="final-score">
                <span class="label" id="summary-score-label">Total Score</span>
                <span id="summary-score" class="value">0</span>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="label" id="words-found-label">Words Found</span>
                    <span id="summary-words-found" class="value-small">0</span>
                </div>
            </div>
            <div class="menu-actions column">
                <button id="summary-back-btn" class="primary-btn">Back to Menu</button>
                <button id="share-score-btn-summary" class="secondary-btn">Share Score 🏆</button>
            </div>
        </main>



        <main id="how-to-play-screen" class="hidden scrollable-screen">
            <h2 id="how-to-play-title" tabindex="-1">How to Play</h2>
            <p id="how-to-play-intro"></p>
            <h3 id="how-to-play-rules-header"></h3>
            <ul class="rules-list">
                <li id="how-to-play-rule1"></li>
                <li id="how-to-play-rule2"></li>
                <li id="how-to-play-rule3"></li>
                <li id="how-to-play-rule4"></li>
                <li id="how-to-play-rule5"></li>
            </ul>
            <p id="how-to-play-outro"></p>
            <div class="menu-actions">
                <button id="close-instructions-btn" class="primary-btn">Back</button>
            </div>
        </main>

        <div id="toast-container"></div>
    </div>
    <script src="/js/translations.js?h=7ec019b1"></script>
    <script src="/js/app.js?h=233ab6a0"></script>
</body>

</html>
