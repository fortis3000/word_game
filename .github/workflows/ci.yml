name: CI

on: [push, pull_request]

env:
  PYTHON_VERSION: "3.12"

jobs:
  check_dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: yezz123/setup-uv@v4

      - name: Check if uv.lock is in sync
        run: uv pip check

  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Installing Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: ".venv"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-

      - name: Install linting dependencies
        run: uv pip install -r environment/linting-requirements.txt

      - name: Checking linting with ruff
        run: ruff check .

      - name: Checking formatting with ruff
        run: ruff format .

  testing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Installing Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: yezz123/setup-uv@v4
        with:
          uv-venv: ".venv"

      - name: Cache uv virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: uv pip install -r environment/dev-reqirements.txt

      - name: Run tests with pytest and coverage
        run: |
          coverage run -m pytest -v .
          coverage report -m --fail-under=80

  build_docker_images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build embedding service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/embeddinggemma-cpu.Dockerfile
          push: false

      - name: Build telegram bot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/telegram-bot.Dockerfile
          push: false
