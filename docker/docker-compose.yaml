networks:
  word-game-net:
    driver: bridge

services:
  embedding-service:
    build:
      context: ..
      dockerfile: docker/embeddinggemma-cpu.Dockerfile
    networks:
      - word-game-net
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../models/embeddinggemma300:/app/model
    command: [ "uv", "run", "uvicorn", "src.embedding_service.main:app", "--host", "0.0.0.0", "--port", "8000" ]

  game-app:
    build:
      context: ..
      dockerfile: docker/game.Dockerfile
    networks:
      - word-game-net
    ports:
      - "80:8080"
    depends_on:
      embedding-service:
        condition: service_started
    env_file:
      - ../.env
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding-service:8000
    volumes:
      - ../data:/app/data
      - ..src/:app/src
    command: [ "uv", "run", "uvicorn", "src.game.api:app", "--host", "0.0.0.0", "--port", "8080" ]

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/telegram-bot.Dockerfile
    networks:
      - word-game-net
    depends_on:
      embedding-service:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding-service:8000
    volumes:
      - ../data:/app/data
      - ..src/:app/src
      - ..configs/:app/configs
    command: [ "uv", "run", "python", "-m", "src.telegram_bot" ]
