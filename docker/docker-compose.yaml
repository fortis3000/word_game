networks:
  word-game-net:
    driver: bridge

services:
  embedding-service:
    build:
      context: ..
      dockerfile: docker/harrier-cpu.Dockerfile
    networks:
      - word-game-net
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../models/harrier-oss-v1-0.6b:/app/model
    command: [ "uv", "run", "uvicorn", "src.embedding_service.main:app", "--host", "0.0.0.0", "--port", "8000" ]

  game-app:
    build:
      context: ..
      dockerfile: docker/game.Dockerfile
    networks:
      - word-game-net
    ports:
      - "80:8080"
    depends_on:
      embedding-service:
        condition: service_started
    env_file:
      - ../.env
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding-service:8000
    volumes:
      - ../data:/app/data
      - ../src:/app/src
    command: [ "uv", "run", "uvicorn", "src.game.api:app", "--host", "0.0.0.0", "--port", "8080" ]

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/telegram-bot.Dockerfile
    networks:
      - word-game-net
    depends_on:
      embedding-service:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      - EMBEDDING_SERVICE_URL=http://embedding-service:8000
    volumes:
      - ../data:/app/data
      - ../src:/app/src
      - ../configs:/app/configs
    command: [ "uv", "run", "python", "-m", "src.telegram_bot" ]

  prometheus:
    image: prom/prometheus:latest
    networks:
      - word-game-net
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    environment:
      - PROMETHEUS_PASSWORD=${PROMETHEUS_PASSWORD:-changeme_in_production}
    entrypoint: [ "/bin/sh", "-c", "echo \"$$PROMETHEUS_PASSWORD\" > /prometheus/prom_password && exec /bin/prometheus \"$$@\"", "--" ]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

volumes:
  prometheus_data:
